##############################################################################
#                                  CORNERS                                   #
##############################################################################

corner-radius = 15;
rounded-corners-exclude = [
  "class_g = 'Polybar'",
];

round-borders = 15;
round-borders-exclude = [
    "class_g = 'polybar'",
];

round-borders-rule = [];

##############################################################################
#                                  SHADOWS                                   #
##############################################################################

shadow = true;
shadow-radius = 15;
shadow-opacity = .75;
shadow-offset-x = -15;
shadow-offset-y = -15;

shadow-exclude = [
    "class_g = 'firefox' && argb",
    "class_g = 'Polybar'",
    "_GTK_FRAME_EXTENTS@:c"
];

##############################################################################
#                                  FADING                                    #
##############################################################################

fading = false;
fade-in-step = 0.09;
fade-out-step = 0.09;
fade-delta = 10;

##############################################################################
#                                   OPACITY                                  #
##############################################################################

inactive-opacity = 1.0;
frame-opacity = 1.0;
opacity = 1.0;
inactive-opacity-override = false;
active-opacity = 1.0;

focus-exclude = [ "class_g = 'Cairo-clock'" ];

##############################################################################
#                                    BLUR                                    #
##############################################################################
# Desactivado completamente para máximo rendimiento en Máquina Virtual

blur-background = false;
blur-background-frame = false;
blur-background-fixed = false;

##############################################################################
#                                    GENERAL                                 #
##############################################################################

# xrender es mucho más rápido y estable en entornos virtualizados que glx
backend = "xrender";

vsync = false;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

# Vital para el rendimiento: Solo redibuja las partes de la pantalla que cambian
use-damage = true;

log-level = "warn";

wintypes:
{
  tooltip = { fade = true; shadow = true; shadow-radius = 0; shadow-opacity = 1.0; shadow-offset-x = -20; shadow-offset-y = -20; opacity = 0.8; full-shadow = true; }; 
  dnd = { shadow = false; }
  dropdown_menu = { shadow = false; };
  popup_menu    = { shadow = false; };
  utility       = { shadow = false; };
}
